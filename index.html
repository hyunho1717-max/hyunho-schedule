<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현호 일정관리</title>

<style>
body { font-family:-apple-system; background:#fafafa; margin:0;}
.container { max-width:700px; margin:auto; padding:16px;}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.left-group {
  display:flex;
  gap:8px;
  align-items:center;
}

.view-buttons button, .add-btn {
  border:none;
  background:#eee;
  padding:6px 10px;
  border-radius:10px;
}

.view-buttons .active { background:black; color:white;}
.add-btn { background:black; color:white; }

.calendar {
  background:white;
  border-radius:16px;
  padding:12px;
  margin-top:10px;
}

.weekdays, .days {
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.weekdays div {
  text-align:center;
  font-size:12px;
}

/* 🔥 요일 색상 */
.weekdays div:nth-child(1) { color:red; }
.weekdays div:nth-child(7) { color:blue; }

.day {
  background:#fafafa;
  border-radius:10px;
  min-height:80px;
  padding:6px;
  cursor:pointer;
}

/* 날짜 색상 */
.day:nth-child(7n+1) { color:red; }
.day:nth-child(7n) { color:blue; }

.event-bar, .todo-bar {
  font-size:10px;
  border-radius:6px;
  padding:2px;
  margin-top:2px;
  cursor:pointer;
}

.event-bar { background:black; color:white;}
.todo-bar { background:#ddd;}

.modal {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:16px;
  width:320px;
  max-height:90vh;
  overflow-y:auto;
}

/* 🔥 UI 깨짐 방지 */
.modal-content::-webkit-scrollbar {
  height:6px;
}

input, select, textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

textarea {
  height:80px;
  resize:none;
}

.checkbox-row {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}

button.main {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  margin-top:12px;
}

.emoji-list {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.emoji {
  font-size:20px;
  cursor:pointer;
  padding:5px;
  border-radius:6px;
}

.emoji.active {
  background:black;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="header">

  <!-- 🔥 좌측 추가 버튼 -->
  <div class="left-group">
    <button class="add-btn" onclick="openModal()">+ 추가</button>
    <h3 id="monthLabel"></h3>
  </div>

  <div class="view-buttons">
    <button onclick="setView('month')" class="active">월</button>
    <button onclick="setView('week')">주</button>
    <button onclick="setView('day')">일</button>
  </div>

</div>

<div class="calendar">
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div>
    <div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="days" id="calendar"></div>
</div>

<!-- 모달 -->
<div class="modal" id="modal" onclick="outsideClose(event)">
  <div class="modal-content">

    <h3>일정 추가</h3>

    <select id="type">
      <option value="event">이벤트</option>
      <option value="todo">To-do</option>
    </select>

    <input id="name" placeholder="제목 (1~20자)">

    <!-- 이모지 -->
    <div class="emoji-list" id="emojiList"></div>

    <!-- 🔥 시간 (시작/종료) -->
    <select id="startTime"></select>
    <select id="endTime"></select>

    <!-- 🔥 종일 체크 -->
    <div class="checkbox-row">
      <input type="checkbox" id="allDay">
      <label>종일 일정</label>
    </div>

    <textarea id="desc" placeholder="설명 (최대 30자)"></textarea>

    <button class="main" onclick="addItem()">저장</button>

  </div>
</div>

</div>

<script>
let view='month';
let today=new Date();
let currentYear=today.getFullYear();
let currentMonth=today.getMonth();
let selectedDate=null;
let selectedEmoji="📌";

let data=JSON.parse(localStorage.getItem("data")||"{}");

function save(){ localStorage.setItem("data",JSON.stringify(data)); }

/* 이모지 */
["📌","🔥","💪","🎉","📚","💰","❤️","🏃","🍽️"].forEach(e=>{
  const el=document.createElement("span");
  el.innerText=e;
  el.className="emoji";
  el.onclick=()=>{
    document.querySelectorAll(".emoji").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
    selectedEmoji=e;
  };
  document.getElementById("emojiList").appendChild(el);
});

/* 시간 */
function fillTime(id){
  const sel=document.getElementById(id);
  for(let i=0;i<24;i++){
    let t=(i<10?"0"+i:i)+":00";
    let opt=document.createElement("option");
    opt.value=t;
    opt.innerText=t;
    sel.appendChild(opt);
  }
}
fillTime("startTime");
fillTime("endTime");

/* 달력 */
function getDaysInMonth(y,m){
  return new Date(y,m+1,0).getDate();
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  document.getElementById("monthLabel").innerText=`${currentYear}.${currentMonth+1}`;

  let days=getDaysInMonth(currentYear,currentMonth);

  for(let i=1;i<=days;i++){
    const d=document.createElement("div");
    d.className="day";
    d.innerHTML=`<strong>${i}</strong>`;

    if(data[i]){
      data[i].forEach(item=>{
        const el=document.createElement("div");
        el.className=item.type==="event"?"event-bar":"todo-bar";
        el.innerText=item.emoji+" "+item.name;

        d.appendChild(el);
      });
    }

    d.onclick=()=>{
      selectedDate=i;
      openModal();
    };

    cal.appendChild(d);
  }
}

/* 모달 */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function outsideClose(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display="none";
  }
}

/* 저장 */
function addItem(){
  const name=document.getElementById("name").value;
  const type=document.getElementById("type").value;
  const start=document.getElementById("startTime").value;
  const end=document.getElementById("endTime").value;
  const allDay=document.getElementById("allDay").checked;
  const desc=document.getElementById("desc").value;

  if(!name||name.length>20){ alert("제목 1~20자"); return;}
  if(desc.length>30){ alert("설명 30자 이하"); return;}

  if(!data[selectedDate]) data[selectedDate]=[];

  data[selectedDate].push({
    name, type,
    emoji:selectedEmoji,
    start, end, allDay,
    desc
  });

  save();
  document.getElementById("modal").style.display="none";
  renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
