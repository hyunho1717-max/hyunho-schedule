<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현호 일정관리 v2</title>

<style>
body {
  font-family: -apple-system;
  background: #fafafa;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 16px;
}

.header {
  text-align: center;
  margin-bottom: 10px;
}

.calendar {
  background: white;
  border-radius: 16px;
  padding: 12px;
}

.weekdays, .days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.weekdays div {
  text-align: center;
  font-size: 12px;
}

.weekdays div:nth-child(1) { color: red; }
.weekdays div:nth-child(7) { color: blue; }

.day {
  border-radius: 10px;
  min-height: 80px;
  padding: 6px;
  cursor: pointer;
}

.day:hover {
  background: #eee;
}

.date-num {
  font-size: 12px;
  margin-bottom: 4px;
}

.event {
  font-size: 10px;
  background: black;
  color: white;
  border-radius: 6px;
  padding: 2px;
  margin-top: 2px;
  cursor: pointer;
}

/* 모달 */
.modal {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2 id="monthLabel"></h2>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div>
    <div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="days" id="days"></div>
</div>

</div>

<!-- 모달 -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

/* =========================
   🧠 STATE
========================= */
const state = {
  current: new Date(),
  selectedDate: null,
  selectedEvent: null,
  events: JSON.parse(localStorage.getItem("events") || "[]")
};

function save() {
  localStorage.setItem("events", JSON.stringify(state.events));
}

/* =========================
   📅 UTIL
========================= */
function formatDate(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

/* =========================
   🎨 RENDER
========================= */
function render() {
  renderHeader();
  renderCalendar();
}

function renderHeader() {
  const y = state.current.getFullYear();
  const m = state.current.getMonth();
  document.getElementById("monthLabel").innerText = `${y}.${m+1}`;
}

function renderCalendar() {
  const daysEl = document.getElementById("days");
  daysEl.innerHTML = "";

  const y = state.current.getFullYear();
  const m = state.current.getMonth();

  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();

  // 빈칸
  for (let i = 0; i < firstDay; i++) {
    daysEl.innerHTML += `<div></div>`;
  }

  // 날짜
  for (let d = 1; d <= lastDate; d++) {

    const dateStr = formatDate(y, m, d);

    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `<div class="date-num">${d}</div>`;

    // 이벤트 표시
    state.events
      .filter(e => e.date === dateStr)
      .forEach(e => {
        const ev = document.createElement("div");
        ev.className = "event";
        ev.innerText = e.title;

        ev.onclick = (event) => {
          event.stopPropagation();
          openDetail(e);
        };

        div.appendChild(ev);
      });

    div.onclick = () => openAddModal(dateStr);

    daysEl.appendChild(div);
  }
}

/* =========================
   ⚙️ MODAL (핵심 구조)
========================= */

function openAddModal(date) {
  state.selectedDate = date;
  state.selectedEvent = null;

  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <h3>${date}</h3>
    <input id="input" placeholder="일정 입력">
    <button onclick="addEvent()">추가</button>
  `;

  document.getElementById("modal").style.display = "flex";
}

function openDetail(eventData) {
  state.selectedEvent = eventData;

  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <h3>${eventData.title}</h3>
    <p>${eventData.date}</p>
    <button onclick="closeDetail()">닫기</button>
  `;

  document.getElementById("modal").style.display = "flex";
}

function closeDetail() {
  state.selectedEvent = null;
  document.getElementById("modal").style.display = "none";
}

/* =========================
   ➕ ADD EVENT
========================= */
function addEvent() {
  const val = document.getElementById("input").value;

  if (!val) return;

  state.events.push({
    id: Date.now(),
    date: state.selectedDate,
    title: val
  });

  save();

  document.getElementById("modal").style.display = "none";
  render();
}

/* =========================
   ❌ CLOSE MODAL
========================= */
function closeModal(e) {
  if (e.target.id === "modal") {
    document.getElementById("modal").style.display = "none";
  }
}

/* =========================
   🚀 INIT
========================= */
render();

</script>

</body>
</html>
