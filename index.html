<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현호 일정관리</title>

<style>
body { font-family:-apple-system; background:#fafafa; margin:0;}
.container { max-width:700px; margin:auto; padding:16px;}

.header { display:flex; justify-content:space-between; align-items:center;}
.left-group { display:flex; gap:8px; align-items:center;}

.add-btn {
  background:black; color:white;
  border:none; padding:6px 10px;
  border-radius:10px;
}

.view-buttons button {
  border:none; background:#eee;
  padding:6px 10px;
  border-radius:10px;
}
.view-buttons .active { background:black; color:white;}

.calendar { background:white; border-radius:16px; padding:12px; margin-top:10px;}

.weekdays, .days {
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.weekdays div { text-align:center; font-size:12px;}
.weekdays div:nth-child(1){color:red;}
.weekdays div:nth-child(7){color:blue;}

.day {
  background:#fafafa;
  border-radius:10px;
  min-height:80px;
  padding:6px;
  cursor:pointer;
}

/* 날짜 색상 */
.day:nth-child(7n+1){color:red;}
.day:nth-child(7n){color:blue;}

.event-bar, .todo-bar {
  font-size:10px;
  border-radius:6px;
  padding:2px;
  margin-top:2px;
  cursor:pointer;
  transition:all 0.2s;
}

.event-bar:hover, .todo-bar:hover {
  transform:scale(1.05);
}

.event-bar { background:black; color:white;}
.todo-bar { background:#ddd;}

/* 모달 */
.modal {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.2s;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:16px;
  width:320px;
  max-height:90vh;
  overflow-y:auto;
  animation:slideUp 0.2s;
}

@keyframes slideUp {
  from {transform:translateY(20px);}
  to {transform:translateY(0);}
}

input, select, textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

textarea { height:80px; resize:none;}

/* 🔥 종일 일정 */
.checkbox-row {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}

.checkbox-row input {
  accent-color:#007aff;
}

/* 버튼 */
button.main {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  margin-top:12px;
}

/* 이모지 */
.emoji-list {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.emoji {
  font-size:20px;
  cursor:pointer;
  padding:5px;
  border-radius:6px;
}

.emoji.active {
  background:black;
  color:white;
}

/* 상세 */
.card-item {
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="left-group">
    <button class="add-btn" onclick="openAddModal()">+ 추가</button>
    <h3 id="monthLabel"></h3>
  </div>

  <div class="view-buttons">
    <button onclick="setView('month')" class="active">월</button>
    <button onclick="setView('week')">주</button>
    <button onclick="setView('day')">일</button>
  </div>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div>
    <div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="days" id="calendar"></div>
</div>

<!-- 추가 모달 -->
<div class="modal" id="addModal" onclick="outsideClose(event)">
  <div class="modal-content">

    <h3>일정 추가</h3>

    <select id="type">
      <option value="event">이벤트</option>
      <option value="todo">To-do</option>
    </select>

    <input id="name" placeholder="제목 (1~20자)">

    <div class="emoji-list" id="emojiList"></div>

    <select id="startTime"></select>
    <select id="endTime"></select>

    <div class="checkbox-row">
      <input type="checkbox" id="allDay">
      <label>종일 일정</label>
    </div>

    <textarea id="desc" placeholder="설명 (최대 30자)"></textarea>

    <button class="main" onclick="addItem()">저장</button>

  </div>
</div>

<!-- 상세 모달 -->
<div class="modal" id="detailModal" onclick="outsideClose(event)">
  <div class="modal-content" id="detailContent"></div>
</div>

</div>

<script>
let selectedDate=null;
let selectedEmoji="📌";
let editingIndex=null;

let data=JSON.parse(localStorage.getItem("data")||"{}");

function save(){ localStorage.setItem("data",JSON.stringify(data)); }

/* 이모지 */
["📌","🔥","💪","🎉","📚","💰","❤️","🏃","🍽️"].forEach(e=>{
  const el=document.createElement("span");
  el.innerText=e;
  el.className="emoji";
  el.onclick=()=>{
    document.querySelectorAll(".emoji").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
    selectedEmoji=e;
  };
  document.getElementById("emojiList").appendChild(el);
});

/* 시간 */
function fillTime(id){
  for(let i=0;i<24;i++){
    let t=(i<10?"0"+i:i)+":00";
    let opt=document.createElement("option");
    opt.value=t;
    opt.innerText=t;
    document.getElementById(id).appendChild(opt);
  }
}
fillTime("startTime");
fillTime("endTime");

/* 달력 */
function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=1;i<=30;i++){
    const d=document.createElement("div");
    d.className="day";
    d.innerHTML=`<strong>${i}</strong>`;

    if(data[i]){
      data[i].forEach((item,idx)=>{
        const el=document.createElement("div");
        el.className=item.type==="event"?"event-bar":"todo-bar";
        el.innerText=item.emoji+" "+item.name;

        el.onclick=(e)=>{
          e.stopPropagation();
          openDetail(i,idx);
        };

        d.appendChild(el);
      });
    }

    d.onclick=()=>{
      selectedDate=i;
      openAddModal();
    };

    cal.appendChild(d);
  }
}

/* 추가 */
function openAddModal(){
  document.getElementById("addModal").style.display="flex";
}

/* 상세 */
function openDetail(date, idx){
  const item=data[date][idx];
  editingIndex=idx;
  selectedDate=date;

  document.getElementById("detailContent").innerHTML=`
    <div class="card-item">
      <h3>${item.emoji} ${item.name}</h3>
      <p>${item.start} ~ ${item.end}</p>
      <p>${item.desc||""}</p>

      <button class="main" onclick="editItem()">수정</button>
      <button class="main" onclick="deleteItem()">삭제</button>
    </div>
  `;

  document.getElementById("detailModal").style.display="flex";
}

/* 수정 */
function editItem(){
  const item=data[selectedDate][editingIndex];
  document.getElementById("name").value=item.name;
  document.getElementById("desc").value=item.desc;
  document.getElementById("addModal").style.display="flex";
}

/* 삭제 */
function deleteItem(){
  data[selectedDate].splice(editingIndex,1);
  save();
  document.getElementById("detailModal").style.display="none";
  renderCalendar();
}

/* 저장 */
function addItem(){
  const name=document.getElementById("name").value;
  const desc=document.getElementById("desc").value;
  const start=document.getElementById("startTime").value;
  const end=document.getElementById("endTime").value;

  if(!name || name.length>20){ alert("제목 1~20자"); return;}
  if(desc.length>30){ alert("설명 30자"); return;}

  if(!data[selectedDate]) data[selectedDate]=[];

  data[selectedDate].push({
    name,
    desc,
    start,
    end,
    emoji:selectedEmoji
  });

  save();
  document.getElementById("addModal").style.display="none";
  renderCalendar();
}

/* 모달 닫기 */
function outsideClose(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display="none";
  }
}

renderCalendar();
</script>

</body>
</html>
