<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현호 일정관리</title>

<style>
body { font-family:-apple-system; background:#fafafa; margin:0;}
.container { max-width:700px; margin:auto; padding:16px;}

.header { display:flex; justify-content:space-between; align-items:center;}

.view-buttons button {
  border:none; background:#eee; padding:6px 10px; border-radius:10px;
}
.view-buttons .active { background:black; color:white;}

.calendar { background:white; border-radius:16px; padding:12px; margin-top:10px;}
.weekdays, .days { display:grid; grid-template-columns:repeat(7,1fr);}
.weekdays { font-size:12px; color:gray; text-align:center;}

.day {
  background:#fafafa; border-radius:10px;
  min-height:80px; padding:6px;
  cursor:pointer;
}

.day.week { height:200px; overflow-y:auto;}

.event-bar, .todo-bar {
  font-size:10px; border-radius:6px; padding:2px;
  margin-top:2px;
  cursor:pointer;
}

.event-bar { background:black; color:white;}
.todo-bar { background:#ddd;}

.detail { display:none; }

button.main {
  width:100%; padding:10px;
  border:none; border-radius:10px;
  background:black; color:white;
  margin-top:8px;
}

/* 모달 공통 */
.modal {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:16px;
  width:320px;
  max-height:80vh;
  overflow:auto;
}

/* 입력 UI */
input, select, textarea {
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

textarea {
  height:80px;
  resize:none;
}

/* 이모지 선택 */
.emoji-list {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}

.emoji {
  font-size:20px;
  cursor:pointer;
  padding:5px;
  border-radius:6px;
}

.emoji.active {
  background:black;
  color:white;
}

/* 상세 카드 */
.card-item {
  background:white;
  border-radius:12px;
  padding:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2 id="monthLabel"></h2>

  <div class="view-buttons">
    <button onclick="setView('month')" class="active">월</button>
    <button onclick="setView('week')">주</button>
    <button onclick="setView('day')">일</button>
  </div>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div>
    <div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="days" id="calendar"></div>
</div>

<!-- 추가 모달 -->
<div class="modal" id="modal" onclick="outsideClose(event)">
  <div class="modal-content">
    <h3>일정 추가</h3>

    <select id="type">
      <option value="event">이벤트</option>
      <option value="todo">To-do</option>
    </select>

    <input id="name" placeholder="제목 (1~20자)">

    <!-- 이모지 -->
    <div class="emoji-list" id="emojiList"></div>

    <!-- 시간 -->
    <select id="time"></select>

    <!-- 설명 -->
    <textarea id="desc" placeholder="설명 (최대 30자)"></textarea>

    <button class="main" onclick="addItem()">저장</button>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal" id="detailModal" onclick="outsideClose(event)">
  <div class="modal-content" id="detailContent"></div>
</div>

</div>

<script>
let view = 'month';
let today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let currentDay = today.getDate();

let selectedDate = null;
let selectedEmoji = "📌";

let data = JSON.parse(localStorage.getItem("data") || "{}");

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

/* 이모지 초기화 */
const emojis = ["📌","🔥","💪","🎉","📚","💰","❤️","🏃","🍽️"];
const emojiList = document.getElementById("emojiList");

emojis.forEach(e=>{
  const span = document.createElement("span");
  span.innerText = e;
  span.className = "emoji";
  span.onclick = ()=>{
    document.querySelectorAll(".emoji").forEach(el=>el.classList.remove("active"));
    span.classList.add("active");
    selectedEmoji = e;
  };
  emojiList.appendChild(span);
});

/* 시간 드롭다운 */
const timeSelect = document.getElementById("time");
for(let i=0;i<24;i++){
  const t = (i<10?"0"+i:i)+":00";
  const opt = document.createElement("option");
  opt.value=t;
  opt.innerText=t;
  timeSelect.appendChild(opt);
}

/* 뷰 */
function setView(v){
  view=v;
  renderCalendar();
}

function getDaysInMonth(y,m){
  return new Date(y,m+1,0).getDate();
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  document.getElementById("monthLabel").innerText =
    `${currentYear}.${currentMonth+1}`;

  let days = view==='week'?7:getDaysInMonth(currentYear,currentMonth);

  if(view==='day'){
    days = 1;
  }

  for(let i=1;i<=days;i++){
    const d = document.createElement("div");
    d.className="day";
    d.innerHTML=`<strong>${i}</strong>`;

    if(data[i]){
      data[i].forEach(item=>{
        const el = document.createElement("div");
        el.className=item.type==="event"?"event-bar":"todo-bar";
        el.innerText=item.emoji+" "+item.name;

        el.onclick=(e)=>{
          e.stopPropagation();
          openDetail(item);
        };

        d.appendChild(el);
      });
    }

    d.onclick=()=>{
      selectedDate=i;
      openModal();
    };

    cal.appendChild(d);
  }
}

/* 추가 */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function outsideClose(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display="none";
  }
}

function addItem(){
  const name=document.getElementById("name").value;
  const type=document.getElementById("type").value;
  const time=document.getElementById("time").value;
  const desc=document.getElementById("desc").value;

  if(!name || name.length>20){
    alert("제목은 1~20자");
    return;
  }

  if(desc.length>30){
    alert("설명은 30자 이하");
    return;
  }

  if(!data[selectedDate]) data[selectedDate]=[];

  data[selectedDate].push({
    name,
    type,
    emoji:selectedEmoji,
    time,
    desc
  });

  save();
  document.getElementById("modal").style.display="none";
  renderCalendar();
}

/* 상세 보기 */
function openDetail(item){
  const modal=document.getElementById("detailModal");
  const content=document.getElementById("detailContent");

  content.innerHTML=`
    <div class="card-item">
      <h3>${item.emoji} ${item.name}</h3>
      <p>${item.time}</p>
      <p>${item.desc || "설명 없음"}</p>
    </div>
  `;

  modal.style.display="flex";
}

renderCalendar();
</script>

</body>
</html>
